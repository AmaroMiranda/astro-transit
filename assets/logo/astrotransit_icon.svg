<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AstroTransit">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg" cx="38%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#1b2440"/>
      <stop offset="55%" stop-color="#0e1428"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <!-- Moon body -->
    <radialGradient id="moon" cx="40%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#fdfbf3"/>
      <stop offset="45%" stop-color="#f4eeda"/>
      <stop offset="78%" stop-color="#dcd2b6"/>
      <stop offset="100%" stop-color="#b9ad8c"/>
    </radialGradient>
    <!-- Moon outer glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f0dc" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#e8e0c0" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#e8e0c0" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle terminator shading on the moon -->
    <radialGradient id="shade" cx="34%" cy="30%" r="88%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="72%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a3320" stop-opacity="0.35"/>
    </radialGradient>
    <clipPath id="moonClip">
      <circle cx="256" cy="248" r="150"/>
    </clipPath>
    <!-- Motion arc gradient -->
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ec2ff" stop-opacity="0"/>
      <stop offset="55%" stop-color="#5ec2ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#8be0ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2338"/>
    </linearGradient>
  </defs>

  <!-- Rounded square backdrop -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#cdd8f0">
    <circle cx="96" cy="110" r="2.6" opacity="0.9"/>
    <circle cx="150" cy="70" r="1.6" opacity="0.6"/>
    <circle cx="410" cy="120" r="2.2" opacity="0.8"/>
    <circle cx="440" cy="200" r="1.4" opacity="0.5"/>
    <circle cx="70" cy="330" r="1.8" opacity="0.7"/>
    <circle cx="120" cy="420" r="2.4" opacity="0.85"/>
    <circle cx="430" cy="400" r="1.6" opacity="0.6"/>
    <circle cx="380" cy="450" r="2.0" opacity="0.7"/>
    <circle cx="256" cy="60" r="1.5" opacity="0.5"/>
  </g>

  <!-- Moon glow -->
  <circle cx="256" cy="248" r="196" fill="url(#glow)"/>

  <!-- Moon -->
  <circle cx="256" cy="248" r="150" fill="url(#moon)"/>
  <g clip-path="url(#moonClip)">
    <!-- Craters -->
    <g fill="#c8bd9c" opacity="0.55">
      <circle cx="205" cy="205" r="24"/>
      <circle cx="300" cy="180" r="15"/>
      <circle cx="330" cy="270" r="30"/>
      <circle cx="215" cy="315" r="18"/>
      <circle cx="270" cy="330" r="10"/>
      <circle cx="180" cy="270" r="9"/>
    </g>
    <g fill="#fbf7e8" opacity="0.5">
      <circle cx="200" cy="200" r="24"/>
      <circle cx="296" cy="176" r="15"/>
      <circle cx="325" cy="264" r="30"/>
      <circle cx="211" cy="310" r="18"/>
    </g>
    <circle cx="256" cy="248" r="150" fill="url(#shade)"/>
  </g>

  <!-- Motion trajectory arc -->
  <path d="M 92 352 Q 230 236 452 176" stroke="url(#arc)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Airplane crossing in front of the moon (top-down airliner silhouette) -->
  <g transform="translate(256 248) rotate(-28)">
    <!-- glow separation halo behind plane -->
    <g fill="#fcf8ea" opacity="0.35">
      <ellipse cx="0" cy="0" rx="86" ry="30"/>
    </g>
    <g fill="url(#plane)" stroke="#000000" stroke-opacity="0.25" stroke-width="1.5">
      <!-- fuselage -->
      <path d="M -78 0
               C -78 -8, -60 -12, -30 -12
               L 44 -11
               C 62 -11, 78 -6, 84 0
               C 78 6, 62 11, 44 11
               L -30 12
               C -60 12, -78 8, -78 0 Z"/>
      <!-- main wings -->
      <path d="M 6 -9 L -34 -78 L -14 -78 L 30 -8 Z"/>
      <path d="M 6 9 L -34 78 L -14 78 L 30 8 Z"/>
      <!-- tail wings -->
      <path d="M -64 -6 L -86 -34 L -74 -34 L -54 -5 Z"/>
      <path d="M -64 6 L -86 34 L -74 34 L -54 5 Z"/>
      <!-- vertical stabilizer hint -->
      <path d="M -72 0 L -92 -3 L -92 3 Z"/>
    </g>
    <!-- cockpit window -->
    <circle cx="70" cy="0" r="3.5" fill="#5ec2ff" opacity="0.85"/>
  </g>
</svg>

# Mantém o backend do Render (free tier) acordado: o serviço hiberna após
# ~15 min sem tráfego, e o primeiro acesso depois disso demora ~30-50s. Este
# workflow bate no /health a cada ~10 min para evitar isso.
# Obs: manter acordado 24/7 consome ~720 das 750 horas/mês gratuitas do Render.
name: keep-alive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping /health
        run: curl -fsS --max-time 90 https://astrotransit-backend.onrender.com/health || true
